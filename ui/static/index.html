<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft — Your personal knowledge base</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,400;0,600&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600&family=Merriweather:ital,wght@0,400;0,700&family=Open+Sans:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600&family=IBM+Plex+Sans:wght@400;600&family=Noto+Serif:ital,wght@0,400;0,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=home,search,sync,unfold_less,unfold_more,push_pin,expand_more,bookmark_add&display=block" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" id="prism-base-theme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="header-title-block">
        <h1>Draft</h1>
        <p class="tagline">Your personal knowledge base</p>
        <div class="header-switches">
          <button type="button" id="theme-switch" class="theme-switch" role="switch" aria-label="Toggle bright theme" title="Night / Bright"><span class="theme-switch-thumb"></span></button>
          <button type="button" id="bg-picker-btn" class="btn-bg-picker" title="Change background image" aria-label="Change background image" aria-expanded="false"><span aria-hidden="true">🖼</span></button>
          <button type="button" id="btn-refresh-page" class="btn-bg-picker" title="Reload page" aria-label="Reload page"><span aria-hidden="true">↻</span></button>
        </div>
      </div>
      <div id="bg-picker-dropdown" class="bg-picker-dropdown hidden" role="listbox" aria-label="Background images"></div>
    </div>
    <div class="header-right search-wrap">
      <input type="search" id="search-input" class="search-input hidden" placeholder="Search documents (full text)…" aria-label="Search documents">
      <div id="search-results" class="search-results hidden" aria-live="polite"></div>
      <button type="button" id="btn-search" class="btn btn-search" title="Search" aria-label="Search"><span class="material-symbols-outlined btn-search-icon" aria-hidden="true">search</span></button>
    </div>
  </header>
  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-toolbar">
        <button type="button" id="btn-pull" class="btn btn-small btn-primary btn-icon" title="Pull latest from managed repos" aria-label="Pull latest from managed repos"><span class="toolbar-btn-icon" aria-hidden="true">↻</span></button>
        <button type="button" id="btn-collapse" class="btn btn-small btn-icon" title="Collapse all folders" aria-label="Collapse all folders"><span class="toolbar-btn-icon" aria-hidden="true">▼</span></button>
        <button type="button" id="btn-expand" class="btn btn-small btn-icon" title="Expand all folders" aria-label="Expand all folders"><span class="toolbar-btn-icon" aria-hidden="true">▶</span></button>
        <button type="button" id="btn-add-source-toggle" class="btn btn-small" title="Add a new source repo" aria-expanded="false">⊕ source</button>
      </div>
      <div id="pull-status" class="pull-status hidden"></div>
      <div id="system-console" class="system-console collapsed">
        <div class="system-console-header" id="system-console-toggle">
          <span class="system-console-dots" aria-hidden="true">
            <span class="system-console-dot system-console-dot-red"></span>
            <span class="system-console-dot system-console-dot-yellow"></span>
            <span class="system-console-dot system-console-dot-green"></span>
          </span>
          <span>SYSTEM CONSOLE</span>
          <span class="system-console-chevron"></span>
        </div>
        <div id="system-console-content" class="system-console-body"></div>
      </div>
      <div class="add-source collapsed" id="add-source-section">
        <div class="add-source-inner">
          <label for="add-source-input" class="add-source-label">Add source</label>
          <input type="text" id="add-source-input" class="add-source-input" placeholder="GitHub URL or local path" aria-label="Add source (GitHub URL or local path)" autocomplete="off">
        </div>
      </div>
      <nav id="tree" class="tree" aria-label="Document tree"></nav>
    </aside>
    <div class="sidebar-resize" id="sidebar-resize" title="Drag to resize sidebar" aria-label="Resize sidebar"></div>
    <div class="content-wrapper" id="content-wrapper">
      <main class="content" id="main-content">
      <div class="content-top">
        <div id="ask-ai" class="ask-ai ask-ai-inline collapsed">
          <div class="ask-ai-header" id="ask-ai-toggle">
            <span class="ask-ai-icon">◇</span>
            <span>Ask (AI)</span>
            <span class="ask-ai-chevron"></span>
          </div>
          <div class="ask-ai-body" id="ask-ai-body">
            <label for="ask-query-input" class="ask-ai-label">Question (answered from your docs only). Press Enter to ask.</label>
            <textarea id="ask-query-input" class="ask-query-input" rows="2" placeholder="e.g. How do we set up X?" aria-label="Ask a question"></textarea>
            <div class="ask-ai-hint-row">
              <h4 class="ask-models-heading" id="ask-models-toggle" role="button" tabindex="0" aria-expanded="false">Models <span class="ask-models-chevron" aria-hidden="true"></span></h4>
            </div>
            <div id="ask-models-wrap" class="ask-models-wrap ask-models-collapsed">
              <div id="ask-models" class="ask-models" aria-live="polite">
                <div class="ask-models-reindex">
                  <button type="button" id="ask-reindex" class="btn-link">Rebuild</button>
                </div>
              </div>
            </div>
            <div id="ask-loading-dots" class="ask-loading-dots hidden" aria-hidden="true"><span class="ask-dot"></span><span class="ask-dot"></span><span class="ask-dot"></span></div>
            <div id="ask-answer" class="ask-answer hidden"></div>
            <div id="ask-citations-wrap" class="ask-citations-wrap hidden">
              <h4 class="ask-citations-heading">Top 3 (cross-encoder ranked)</h4>
              <div id="ask-citations" class="ask-citations"></div>
            </div>
            <div id="ask-error" class="ask-error hidden"></div>
          </div>
          <div class="ask-ai-resize" id="ask-ai-resize" title="Drag to resize height" aria-label="Resize Ask panel height"></div>
        </div>
      </div>
      <div id="doc-viewer-toolbar" class="doc-viewer-toolbar hidden" aria-label="Document view options">
        <label class="doc-viewer-label">Font <select id="doc-font-select" class="doc-viewer-select" aria-label="Document font"></select></label>
        <label class="doc-viewer-label">Size <select id="doc-font-size-select" class="doc-viewer-select" aria-label="Document font size"><option value="small">small</option><option value="medium" selected>medium</option><option value="large">large</option></select></label>
        <label class="doc-viewer-label">Theme <select id="doc-theme-select" class="doc-viewer-select" aria-label="Document theme"></select></label>
        <button type="button" id="doc-set-default-btn" class="doc-viewer-set-default" title="Set current font & theme as default" aria-label="Set current font and theme as default">⭐</button>
        <label class="doc-viewer-label">Lines <select id="doc-reader-lines" class="doc-viewer-select" aria-label="Reader window height in lines"><option value="60">60</option><option value="80">80</option><option value="120" selected>120</option><option value="160">160</option><option value="240">240</option></select></label>
      </div>
      <div id="doc-tabs" class="doc-tabs">
        <div class="doc-tab-bar" role="tablist" aria-label="Document tabs">
          <button type="button" id="btn-sidebar-toggle" class="theme-switch sidebar-switch doc-tab-bar-sidebar-toggle" role="switch" aria-label="Show/hide sidebar" title="Show/hide sidebar" aria-checked="true"><span class="theme-switch-thumb"></span></button>
          <span class="doc-tab-bar-sep" aria-hidden="true"></span>
          <div class="doc-tab-layout">
            <button type="button" class="doc-layout-btn active" id="doc-layout-stacked" data-layout="stacked" title="stacked (one over the other)">stacked</button>
            <button type="button" class="doc-layout-btn" id="doc-layout-side" data-layout="side-by-side" title="side by side">side by side</button>
            <span class="doc-tab-nums" aria-label="Switch tab">
              <button type="button" class="doc-tab-num" id="doc-tab-num-1" data-tab="1" title="Tab 1">1</button>
              <button type="button" class="doc-tab-num" id="doc-tab-num-2" data-tab="2" title="Tab 2">2</button>
            </span>
            <button type="button" class="doc-swap-btn hidden" id="doc-swap-btn" title="swap left and right">⇄ swap</button>
          </div>
        </div>
        <div id="doc-tabs-content" class="doc-tabs-content stacked">
          <div class="doc-pane doc-pane-1 active" id="doc-pane-1" data-pane="1">
            <span class="doc-pane-actions">
              <button type="button" class="doc-pane-save-vault hidden" id="btn-save-to-vault-1" data-pane="1" title="Save this document to vault" aria-label="Save to vault">🔐</button>
              <div class="doc-pane-history" id="doc-pane-history-1" data-pane="1">
                <button type="button" class="doc-history-trigger doc-pane-history-trigger" id="doc-history-trigger-1" data-pane="1" aria-expanded="false" aria-haspopup="true" title="Recent documents in this tab">Recent</button>
                <div class="doc-history-dropdown hidden" id="doc-history-dropdown-1" role="menu" aria-label="Recent documents"></div>
              </div>
              <span class="doc-pane-label" aria-hidden="true">tab 1</span>
            </span>
            <div class="doc-reader-window" id="doc-reader-window-1">
              <div class="placeholder doc-pane-placeholder" id="placeholder-1">Select a document from the tree.</div>
              <article class="doc doc-pane-doc hidden" id="doc-1"></article>
              <div class="error doc-pane-error hidden" id="error-1"></div>
            </div>
          </div>
          <div class="doc-pane doc-pane-2" id="doc-pane-2" data-pane="2">
            <span class="doc-pane-actions">
              <button type="button" class="doc-pane-save-vault hidden" id="btn-save-to-vault-2" data-pane="2" title="Save this document to vault" aria-label="Save to vault">🔐</button>
              <div class="doc-pane-history" id="doc-pane-history-2" data-pane="2">
                <button type="button" class="doc-history-trigger doc-pane-history-trigger" id="doc-history-trigger-2" data-pane="2" aria-expanded="false" aria-haspopup="true" title="Recent documents in this tab">Recent</button>
                <div class="doc-history-dropdown hidden" id="doc-history-dropdown-2" role="menu" aria-label="Recent documents"></div>
              </div>
              <span class="doc-pane-label" aria-hidden="true">tab 2</span>
            </span>
            <div class="doc-reader-window" id="doc-reader-window-2">
              <div class="placeholder doc-pane-placeholder" id="placeholder-2">Select a document from the tree.</div>
              <article class="doc doc-pane-doc hidden" id="doc-2"></article>
              <div class="error doc-pane-error hidden" id="error-2"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="content-resize" id="content-resize" title="Drag to resize reading panel" aria-label="Resize reading panel"></div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
