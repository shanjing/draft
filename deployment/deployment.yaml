# Draft UI Deployment.
# Requires: ConfigMap (draft-config), Secret (draft-secrets), PVC for data (includes HF cache under DRAFT_HOME).
# Apply ConfigMap and Secret first; create PVC if needed; then: kubectl apply -f deployment/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: draft-ui
  namespace: default
  labels:
    app: draft-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: draft-ui
  template:
    metadata:
      labels:
        app: draft-ui
    spec:
      serviceAccountName: draft-ui
      containers:
        - name: draft-ui
          image: draft-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8058
              name: http
          envFrom:
            - configMapRef:
                name: draft-config
            - secretRef:
                name: draft-secrets
                optional: true
          volumeMounts:
            - name: draft-data
              mountPath: /data/draft
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 8058
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8058
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: draft-data
          persistentVolumeClaim:
            claimName: draft-data-pvc
