# Example ConfigMap for Draft UI (non-sensitive config).
# Adjust namespace and values; then: kubectl apply -f deployment/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: draft-config
  namespace: default
  labels:
    app: draft-ui
data:
  DRAFT_HOME: "/data/draft"
  DRAFT_LLM_ENDPOINT: "http://ollama.default.svc.cluster.local:11434"
  OLLAMA_MODEL: "qwen3:8b"
  DRAFT_EMBED_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  DRAFT_CROSS_ENCODER_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  # HF_HUB_OFFLINE: "0"   # optional; omit to allow Hugging Face downloads
