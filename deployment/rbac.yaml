# Example RBAC for Draft UI: ServiceAccount, Role, RoleBinding.
# The Role allows reading ConfigMaps and Secrets in the same namespace (used by envFrom).
# Apply before Deployment: kubectl apply -f deployment/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: draft-ui
  namespace: default
  labels:
    app: draft-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: draft-ui
  namespace: default
  labels:
    app: draft-ui
rules:
  # Allow reading ConfigMaps and Secrets in the same namespace (for envFrom).
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: draft-ui
  namespace: default
  labels:
    app: draft-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: draft-ui
subjects:
  - kind: ServiceAccount
    name: draft-ui
    namespace: default
