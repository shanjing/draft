# Example Secret for Draft UI (API keys and other secrets).
# Add your keys under stringData; then: kubectl apply -f deployment/secret.yaml
# For OpenAI-compatible LLM endpoint, set DRAFT_LLM_API_KEY and DRAFT_LLM_MODEL in ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: draft-secrets
  namespace: default
  labels:
    app: draft-ui
type: Opaque
stringData:
  # Add keys as needed, e.g. for OpenAI-compatible LLM:
  # DRAFT_LLM_API_KEY: "sk-your-api-key"
  # Deployment references this Secret with optional: true, so it can be empty.
  _optional: ""
