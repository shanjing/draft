{{- if not .Values.mcp.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "draft.fullname" . }}
  labels:
    {{- include "draft.labels" . | nindent 4 }}
type: Opaque
stringData:
  # MCP HTTP Bearer token. If blank, the app auto-generates one at startup (printed to stderr).
  # Set mcp.token in values or via --set mcp.token="..." for a stable token across restarts.
  DRAFT_MCP_TOKEN: {{ .Values.mcp.token | default "" | quote }}

  # LLM API keys — set only the key for your chosen provider
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | default "" | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | quote }}
{{- end }}
