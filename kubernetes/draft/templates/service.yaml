apiVersion: v1
kind: Service
metadata:
  name: {{ include "draft.fullname" . }}
  labels:
    {{- include "draft.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "draft.selectorLabels" . | nindent 4 }}
  ports:
    - name: mcp
      port: {{ .Values.service.port }}
      targetPort: mcp
      protocol: TCP
